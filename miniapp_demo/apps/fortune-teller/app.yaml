id: fortune-teller
name: 神秘占卜
version: "1.0"
description: 神秘占卜师——通过问答题库洞察命运，以结构化卦象卡片揭示指引。
entry:
  ui: assets/ui/index.html      # 单一响应式入口(适配 PC 与移动)
permissions:
  - microphone                  # 长按语音输入,由框架统一申请麦克风权限
scripts:
  - name: show_question
    path: scripts/show_question.py
    visibility: [agent]
skill:
  content_file_path: SKILL.md
  binding_tools: [bash, app_emit]
on_init:
  user_message: "进入算命师模式"
on_exit:
  inject_round:
    user: "退出算命师模式。"
    assistant: "好的，我已经退出占卜模式，恢复正常对话的语气和状态。有什么可以帮你的？"
